<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../../../img/logo.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../../css/imprtant-pages/admin/grades.css" />
    <title>Student Grades</title>
  </head>
  <body>
    <header>
      <h1>Grades Dashboard</h1>
    </header>

    <div class="search-container">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        class="search-input"
        type="search"
        placeholder="Search by student number or name..."
      />
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Number</th>
            <th>Retake</th>
            <th>Report</th>
            <th>Grade</th>
            <th>Time</th>
            <th>Review</th>
          </tr>
        </thead>
        <tbody id="studentsTableBody"></tbody>
      </table>
    </div>
    <div
      id="reportModal"
      class="modal"
      style="
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        align-items: center;
        justify-content: center;
      "
    >
      <div
        style="
          background: #1a1a2e;
          padding: 20px;
          border-radius: 15px;
          width: 90%;
          max-width: 500px;
          border: 1px solid #00e0ff;
          color: #fff;
          position: relative;
        "
      >
        <span
          id="closeModal"
          style="
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 25px;
            cursor: pointer;
          "
          >&times;</span
        >
        <h2 id="modalName" style="color: #00e0ff; margin-bottom: 10px"></h2>
        <p id="modalCode" style="color: #ccc"></p>
        <hr style="border: 0.5px solid #333; margin: 15px 0" />
        <div id="modalDetails" style="line-height: 1.8">
          <p>
            <strong>Score:</strong>
            <span id="modalScore" style="color: #2ecc71"></span>
          </p>
          <p>
            <strong>Duration:</strong>
            <span id="modalDuration" style="color: #00e0ff"></span>
          </p>
          <p><strong>Finish Time:</strong> <span id="modalDate"></span></p>
        </div>
        <button
          id="viewFullReport"
          style="
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #00e0ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          View Detailed Report
        </button>
      </div>
    </div>

    <script src="../../../js/imprtant-pages/admin/grades.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test Settings | Interlearn</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link rel="stylesheet" href="../../css/pagas-inner/add-texts.css" />
  </head>
  <body>
    <div class="form-card">
      <div class="header">
        <span class="material-symbols-outlined icon-main">settings</span>
        <h1>Test Settings</h1>
      </div>

      <div class="input-group">
        <select id="secondary">
          <option value="" disabled selected>Select Class</option>
          <option value="First">First Secondary Grade</option>
          <option value="Second">Second Secondary Grade</option>
          <option value="Third">Third Secondary Grade</option>
        </select>

        <div class="row">
          <input type="text" id="exam-name" placeholder="Exam Name" />
          <input
            type="number"
            id="exam-time"
            placeholder="Duration (Minutes)"
          />
        </div>

        <input
          id="start-date"
          type="text"
          placeholder="Pick Start Date & Time"
        />
        <input id="end-date" type="text" placeholder="Pick End Date & Time" />
      </div>
      <div class="visibility-toggle">
        <label class="switch">
          <input type="checkbox" id="is-visible" checked />
          <span class="slider"></span>
        </label>
        <span>Show Exam to Students</span>
      </div>
      <div class="groups-section">
        <h3>
          <span class="material-symbols-outlined">group</span> Target Groups
        </h3>
        <div id="groups-list" class="Groups"></div>
      </div>

      <button type="submit" id="save-btn">
        <span>Save Settings</span>
        <span class="material-symbols-outlined">bolt</span>
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../../js/pagas-inner/add-texts.js"></script>
  </body>
</html>

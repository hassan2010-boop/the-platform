<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile</title>
    <link rel="stylesheet" href="../../css/pagas-inner/edit.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <h1>Edit Profile</h1>
    <h2>Welcome <span id="user-greeting"></span></h2>

    <div class="infor">
      <label for="name">Full Name</label>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input id="name" placeholder="Enter your name" type="text" />
      </div>

      <label for="code">Student Number</label>
      <div class="input-group">
        <i class="fas fa-hashtag"></i>
        <input id="code" placeholder="Enter number" type="text" />
      </div>

      <label for="gmail">Email Address</label>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input id="gmail" placeholder="example@gmail.com" type="text" />
      </div>

      <label for="phone">Phone Number</label>
      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input id="phone" placeholder="01xxxxxxxxx" type="text" />
      </div>

      <label for="password">Password</label>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input id="password" placeholder="New password" type="password" />
        <i class="fas fa-eye" id="togglePassword"></i>
      </div>

      <button id="save">Save Changes</button>
    </div>

    <a href="home.html" class="back-link">Back Home</a>
    <div id="customModal" class="modal-overlay">
      <div class="modal-box">
        <h3 id="modalTitle">System Message</h3>
        <p id="modalMessage"></p>
        <button id="modalOkBtn">Got it</button>
      </div>
    </div>
    <script src="../../js/pagas-inner/edit.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Access Portal</title>
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/base/global.css" />
    <link rel="shortcut icon" href="../the platform.jpg" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <form id="loginForm">
      <h1>LOGIN</h1>
      <div class="input-group">
        <label>code</label>
        <div class="field">
          <i class="fas fa-id-card"></i>
          <input id="code" placeholder="Enter your code" type="text" />
        </div>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="field">
          <i class="fas fa-lock"></i>
          <input id="password" placeholder="Enter password" type="password" />
        </div>
      </div>

      <button type="submit" class="submit" id="submitBtn">OPEN SYSTEM</button>

      <div class="infor">
        <div class="hint"><span>User:</span> <b>hassan</b></div>
        <div class="hint"><span>Pass:</span> <b>123456</b></div>
      </div>

      <div class="by">
        <p>Created by Hassan Abdelrahman</p>
       <div class="social-icons">
          <a
            href="https://www.facebook.com/profile.php?id=61560845742059"
            class="facebook"
          >
            <img
              src="https://img.icons8.com/color/96/facebook-new.png"
              alt="Facebook"
            />
          </a>
          <a href="https://www.instagram.com/skrhsnmd/" class="instagram">
            <img
              src="https://img.icons8.com/color/94/instagram-new.png"
              alt="Instagram"
            />
          </a>
          <a href="https://wa.me/01037056371" class="whatsapp">
            <img
              src="https://img.icons8.com/color/96/whatsapp.png"
              alt="WhatsApp"
            />
          </a>
        </div>
      </div>
      </div>

      <div id="problem" class="error-message" style="display: none"></div>
    </form>

    <script src="../js/login.js"></script>
  </body>
</html>
